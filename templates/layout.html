{% extends "base.html" %}
{% block body %}
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div class="brand-logo">
        <i data-lucide="zap"></i>
      </div>
      <span class="brand-name">NexaCV</span>
    </div>

    <nav class="sidebar__nav">
      <a href="{{ url_for('upload') }}"    class="nav-item {% if request.endpoint == 'upload'    %}active{% endif %}">
        <i data-lucide="upload-cloud"></i><span>Upload Resume</span>
      </a>
      <a href="{{ url_for('results') }}"   class="nav-item {% if request.endpoint == 'results'   %}active{% endif %}">
        <i data-lucide="scan-text"></i><span>Analysis</span>
      </a>
      <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
        <i data-lucide="bar-chart-3"></i><span>Dashboard</span>
      </a>
      <a href="{{ url_for('history') }}"   class="nav-item {% if request.endpoint == 'history'   %}active{% endif %}">
        <i data-lucide="clock-3"></i><span>History</span>
      </a>
      <a href="{{ url_for('download_report') }}" class="nav-item {% if request.endpoint == 'download_report' %}active{% endif %}">
        <i data-lucide="file-down"></i><span>Download Report</span>
      </a>
    </nav>

    <div class="sidebar__footer">
      <div class="user-chip">
        <div class="user-avatar">{{ session.username[0]|upper }}</div>
        <span class="user-name">{{ session.username }}</span>
      </div>
      <a href="{{ url_for('logout') }}" class="logout-btn" title="Logout">
        <i data-lucide="log-out"></i>
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <header class="topbar">
      <button class="topbar__menu" onclick="toggleSidebar()">
        <i data-lucide="menu"></i>
      </button>
      <div class="topbar__title">{% block page_title %}{% endblock %}</div>
      <div class="topbar__actions">{% block topbar_actions %}{% endblock %}</div>
    </header>

    <div class="page-body">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>
{% endblock %}
