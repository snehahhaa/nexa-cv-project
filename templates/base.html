<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}NexaCV{% endblock %}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
<div class="app-shell">

  <!-- ───── SIDEBAR ───── -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <a href="{{ url_for('upload') }}" class="logo-mark">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="20" height="20">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <span class="logo-text">NexaCV</span>
      </a>
    </div>

    <!-- User -->
    {% if username %}
    <div class="sidebar-user">
      <div class="user-avatar">
        {{ username[0].upper() if username else "U" }}
      </div>
      <div>
        <div class="user-name">{{ username }}</div>
        <div class="user-role">Job Seeker</div>
      </div>
    </div>
    {% endif %}

    <!-- NAVIGATION -->
    <nav class="sidebar-nav">
      <div class="nav-section-label">Workspace</div>

      <a href="{{ url_for('upload') }}"
         class="nav-item {% if request.endpoint == 'upload' %}active{% endif %}">
        Upload Resume
      </a>

      <a href="{{ url_for('results') }}"
         class="nav-item {% if request.endpoint == 'results' %}active{% endif %}">
        Analysis
      </a>

      <a href="{{ url_for('dashboard') }}"
         class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
        Dashboard
      </a>

      <div class="nav-section-label" style="margin-top:12px;">Account</div>

      <a href="{{ url_for('history') }}"
         class="nav-item {% if request.endpoint == 'history' %}active{% endif %}">
        My History
      </a>

      <a href="{{ url_for('download_report') }}"
         class="nav-item">
        Download Report
      </a>
    </nav>

    <!-- Logout -->
    <div class="sidebar-footer">
      <a href="{{ url_for('logout') }}" class="logout-btn">
        Sign Out
      </a>
    </div>

  </aside>

  <!-- ───── MAIN CONTENT ───── -->
  <main class="main-content">

    <div class="page-header">
      {% block header %}{% endblock %}
    </div>

    <div class="page-body">
      {% block content %}{% endblock %}
    </div>

  </main>

</div>

{% block scripts %}{% endblock %}
</body>
</html>
