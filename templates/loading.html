<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analysing — NexaCV</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
  <style>
    body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .loading-box { text-align: center; max-width: 400px; padding: 40px; }
    .spinner { width: 60px; height: 60px; border: 4px solid rgba(99,102,241,0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 28px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #f1f5f9; margin-bottom: 8px; }
    .loading-sub { font-size: 0.875rem; color: #64748b; margin-bottom: 32px; }
    .step { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; background: #161d2e; border: 1px solid rgba(255,255,255,0.07); margin-bottom: 10px; font-size: 0.85rem; color: #64748b; transition: all 0.4s; }
    .step.active { color: #818cf8; border-color: rgba(99,102,241,0.3); background: rgba(99,102,241,0.08); }
    .step.done { color: #10b981; border-color: rgba(16,185,129,0.2); background: rgba(16,185,129,0.06); }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="loading-box">
  <div class="spinner"></div>
  <div class="loading-title">Analysing your resume</div>
  <div class="loading-sub">This takes 15–30 seconds. Please wait…</div>
  <div class="step active" id="s1"><div class="step-dot"></div> Extracting skills with NLP</div>
  <div class="step" id="s2"><div class="step-dot"></div> Calculating ATS score</div>
  <div class="step" id="s3"><div class="step-dot"></div> Running Groq AI analysis</div>
  <div class="step" id="s4"><div class="step-dot"></div> Saving results</div>
</div>

<script>
  // Animate steps while waiting
  const steps = ['s1','s2','s3','s4'];
  let i = 0;
  const tick = setInterval(() => {
    if (i > 0) {
      document.getElementById(steps[i-1]).classList.remove('active');
      document.getElementById(steps[i-1]).classList.add('done');
    }
    if (i < steps.length) {
      document.getElementById(steps[i]).classList.add('active');
      i++;
    } else {
      clearInterval(tick);
    }
  }, 4000);

  // Auto redirect to /run after 1 second
  setTimeout(() => { window.location.href = '/run'; }, 1000);
</script>
</body>
</html>
